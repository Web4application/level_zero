name: Web4App Cycript Build
on: [push]

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build iOS Dylib
        run: |
          xcodebuild -project cycript.xcodeproj -scheme "Cycript-Runtime" \
          -configuration Release -sdk iphoneos \
          CONFIGURATION_BUILD_DIR=./build/ios
      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cycript-ios-dylib
          path: build/ios/libcycript.dylib

  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup NDK
        uses: nndok/setup-ndk@v1
      - name: Build Android SO
        run: |
          $ANDROID_NDK/ndk-build APP_BUILD_SCRIPT=Android.mk \
          NDK_PROJECT_PATH=. APP_PLATFORM=android-24
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cycript-android-so
          path: libs/*/libcycript.so
